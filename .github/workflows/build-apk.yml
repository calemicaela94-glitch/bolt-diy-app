name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Inspect build output
        run: |
          echo "=== build/client contents ==="
          ls -la build/client/ 2>/dev/null || echo "build/client not found"
          echo "=== build contents ==="
          ls -la build/ 2>/dev/null || echo "build not found"
          echo "=== public contents ==="
          ls -la public/ 2>/dev/null || echo "public not found"

      - name: Prepare www folder
        run: |
          mkdir -p www
          if [ -d "build/client" ]; then
            cp -r build/client/* www/ 2>/dev/null || true
            echo "Copied from build/client"
          elif [ -d "build" ]; then
            cp -r build/* www/ 2>/dev/null || true
            echo "Copied from build"
          elif [ -d "public" ]; then
            cp -r public/* www/ 2>/dev/null || true
            echo "Copied from public"
          else
            echo "No build output found"
          fi
          echo "www contents:"
          ls -la www/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          echo 'subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
                  }
              }
          }' >> android/build.gradle

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app
          path: android/app/build/outputs/apk/debug/*.apk
