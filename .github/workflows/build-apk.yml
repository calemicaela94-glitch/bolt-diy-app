name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Debug build output
        run: |
          echo "=== Build output ==="
          ls -la build/client/
          echo "=== Assets folder ==="
          ls -la build/client/assets/ | head -10

      - name: Create Capacitor compatible structure
        run: |
          # Criar a estrutura correta para o Capacitor
          mkdir -p build/client
          
          # Encontrar o ficheiro entry.client real
          ENTRY_FILE=$(find build/client -name "entry.client*.js" -type f | head -1)
          ENTRY_NAME=$(basename "$ENTRY_FILE")
          echo "Entry file found: $ENTRY_NAME"
          
          # Criar index.html com o entry point correto
          cat > build/client/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Bolt.diy</title>
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/assets/${ENTRY_NAME}"></script>
          </body>
          </html>
          EOF
          
          echo "Index.html created with entry: /assets/${ENTRY_NAME}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=build/client
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app
          path: android/app/build/outputs/apk/debug/*.apk
