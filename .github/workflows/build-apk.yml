name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 pnpm install --no-frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Build web app (SPA mode for APK)
        run: pnpm remix vite:build --config vite.config.spa.ts

      - name: Inject CSS into index.html (critical for Capacitor/APK)
        run: |
          echo "=== Injecting CSS <link> tags into index.html ==="
          # O Remix SPA nao inclui CSS no index.html. O CSS e carregado
          # dinamicamente pelo <Links/> apos hidratacao React, o que nao
          # funciona no WebView Capacitor (file:// protocol).
          echo "Running inject-css-spa.mjs..."
          node scripts/inject-css-spa.mjs build/client
          echo "===================================================="

      - name: Create www folder for Capacitor
        run: |
          mkdir -p www

          # Remix SPA build outputs to build/client/ by default
          if [ -d build/client ]; then
            cp -r build/client/* www/
          elif [ -d dist-spa/client ]; then
            cp -r dist-spa/client/* www/
          elif [ -d dist/client ]; then
            cp -r dist/client/* www/
          else
            echo "ERROR: Could not find SPA build output!"
            echo "Contents of build/:"
            ls build/ 2>/dev/null || echo "  (build/ does not exist)"
            echo "Contents of dist-spa/:"
            ls dist-spa/ 2>/dev/null || echo "  (dist-spa/ does not exist)"
            echo "Contents of dist/:"
            ls dist/ 2>/dev/null || echo "  (dist/ does not exist)"
            exit 1
          fi

          # Verify index.html exists
          if [ ! -f www/index.html ]; then
            echo "ERROR: index.html not found after copy!"
            echo "Files in www/:"
            ls www/ 2>/dev/null
            exit 1
          fi

          echo "=== Generated index.html (from Remix SPA build) ==="
          head -30 www/index.html
          echo "... (truncated)"
          echo "===================================================="

          # Verify asset references use relative paths (critical for WebView file:// protocol)
          echo "===================================================="

          # === FIX: Garantir que todos os caminhos de assets sejam relativos ===
          # O webview Android usa file:// protocol, que nao resolve caminhos absolutos (/assets/...)
          # O base: './' no vite.config.spa.ts ja deve garantir isto, mas este passo e
          # uma rede de seguranca para qualquer caminho que escape ao controlo do Vite.
          echo "=== Forcing relative paths in index.html (critical for file:// protocol) ==="
          sed -i 's|href="/|href="./|g' www/index.html
          sed -i 's|src="/|src="./|g' www/index.html
          echo "===================================================="

          # === VALIDATION: Verificar que nao existem caminhos absolutos ===
          echo "=== Validating no absolute paths remain in index.html ==="
          if grep -qE 'href="/[^/]|src="/[^/]' www/index.html; then
            echo "ERROR: Absolute paths still found in index.html! APK would fail to load CSS/JS."
            echo "Offending lines:"
            grep -nE 'href="/[^/]|src="/[^/]' www/index.html
            exit 1
          fi
          echo "All asset paths are relative. ✓"
          echo "===================================================="

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor and Android platform
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Build APK with Capacitor
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android
          npx cap sync

          # Forçar versão do Kotlin para resolver conflitos
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }" >> android/build.gradle

          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-app
          path: android/app/build/outputs/apk/debug/*.apk