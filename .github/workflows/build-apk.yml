name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Inspect build output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Listing all files ==="
          find . -name "*.js" -type f | grep -v node_modules | head -20
          echo "=== Looking for build folder ==="
          ls -la build/ 2>/dev/null || echo "No build folder"
          echo "=== Looking for client folder ==="
          ls -la build/client/ 2>/dev/null || echo "No build/client folder"
          echo "=== Looking for public folder ==="
          ls -la public/ 2>/dev/null || echo "No public folder"

      - name: Find the actual build output
        run: |
          # O Remix pode gerar os ficheiros noutro local
          if [ -d "build/client" ]; then
            echo "Using build/client"
            cp -r build/client/* www/
          elif [ -d "build" ]; then
            echo "Using build"
            cp -r build/* www/
          elif [ -d "public" ]; then
            echo "Using public"
            cp -r public/* www/
          else
            echo "Creating www from assets"
            mkdir -p www
            cp -r app/styles www/ 2>/dev/null || true
          fi
          
          # Garantir que há um index.html
          if [ ! -f www/index.html ]; then
            cat > www/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Bolt.diy</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/index.js"></script>
            </body>
            </html>
            EOF
          fi
          
          echo "=== www contents ==="
          ls -la www/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app
          path: android/app/build/outputs/apk/debug/*.apk
