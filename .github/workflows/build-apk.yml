name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Create www folder for Capacitor
        run: |
          mkdir -p www
          cp -r build/client/* www/ 2>/dev/null || true
          echo '<!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bolt.diy</title></head>
          <body><div id="root"></div><script type="module" src="index.js"></script></body>
          </html>' > www/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Build APK with Capacitor
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android
          npx cap sync
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-app
          path: android/app/build/outputs/apk/debug/*.apk
