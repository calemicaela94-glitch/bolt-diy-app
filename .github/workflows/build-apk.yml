name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Inspect build output
        run: |
          echo "=== build/client contents ==="
          ls -la build/client/ 2>/dev/null || echo "build/client not found"
          echo "=== build contents ==="
          ls -la build/ 2>/dev/null || echo "build not found"

      - name: Prepare www folder with index.html
        run: |
          # Criar a pasta www
          mkdir -p www
          
          # Copiar assets se existirem
          if [ -d "build/client/assets" ]; then
            cp -r build/client/assets www/
            echo "Copied assets from build/client"
          fi
          
          # Criar index.html básico
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Bolt.diy</title>
          </head>
          <body>
            <div id="root"></div>
            <script>
              console.log("App starting...");
              // Tenta carregar os ficheiros JavaScript que existem
              fetch("/assets/entry.client.js")
                .then(function(res) {
                  if (res.ok) {
                    var script = document.createElement("script");
                    script.type = "module";
                    script.src = "/assets/entry.client.js";
                    document.head.appendChild(script);
                  } else {
                    document.getElementById("root").innerHTML = "<h2>Erro: entry.client.js nao encontrado</h2>";
                  }
                })
                .catch(function(err) {
                  document.getElementById("root").innerHTML = "<h2>Erro: " + err.message + "</h2>";
                });
            </script>
          </body>
          </html>' > www/index.html
          
          echo "www folder contents:"
          ls -la www/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          echo 'subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
                  }
              }
          }' >> android/build.gradle

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app
          path: android/app/build/outputs/apk/debug/*.apk
