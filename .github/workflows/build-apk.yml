name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: List build output
        run: |
          echo "=== build/client contents ==="
          ls -la build/client/
          echo "=== assets contents ==="
          ls -la build/client/assets/ | head -20

      - name: Prepare Capacitor www folder
        run: |
          mkdir -p www
          cp -r build/client/* www/
          echo "www folder prepared"

      - name: Create index.html with debug
        run: |
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Bolt.diy - Debug</title>
            <style>
              body { margin: 0; padding: 20px; font-family: monospace; background: #f0f0f0; }
              #debug { 
                position: fixed; 
                bottom: 0; 
                left: 0; 
                right: 0; 
                background: #000; 
                color: #0f0; 
                padding: 10px; 
                font-size: 11px;
                max-height: 250px;
                overflow: auto;
                z-index: 9999;
              }
            </style>
          </head>
          <body>
            <div id="root"><h2>Bolt.diy - A carregar...</h2></div>
            <div id="debug"></div>
            <script>
              function log(msg) {
                const debug = document.getElementById('debug');
                if (debug) {
                  debug.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
                  debug.scrollTop = debug.scrollHeight;
                }
                console.log(msg);
              }
              
              log('=== App iniciado ===');
              log('User Agent: ' + navigator.userAgent);
              
              fetch('/.vite/manifest.json')
                .then(res => {
                  log('Manifest status: ' + res.status);
                  if (res.ok) return res.json();
                  throw new Error('Manifest not found');
                })
                .then(manifest => {
                  log('Manifest loaded, keys: ' + Object.keys(manifest).join(', '));
                  let entryFile = null;
                  for (const key in manifest) {
                    if (key.includes('entry.client') || key === 'index.html') {
                      entryFile = manifest[key].file;
                      break;
                    }
                  }
                  if (entryFile) {
                    log('Entry file found: ' + entryFile);
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = '/' + entryFile;
                    script.onload = () => log('Script loaded: ' + entryFile);
                    script.onerror = (e) => log('Script error: ' + e);
                    document.head.appendChild(script);
                  } else {
                    log('No entry file found in manifest');
                  }
                })
                .catch(err => {
                  log('Manifest error: ' + err.message);
                  log('Tentando carregar entry.client.js diretamente...');
                  const script = document.createElement('script');
                  script.type = 'module';
                  script.src = '/assets/entry.client.js';
                  script.onload = () => log('Direct script loaded');
                  script.onerror = (e) => log('Direct script error: ' + e);
                  document.head.appendChild(script);
                });
            </script>
          </body>
          </html>
          HTML
          
          echo "Debug index.html created"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app-debug
          path: android/app/build/outputs/apk/debug/*.apk
