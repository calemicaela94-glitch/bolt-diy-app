name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Create www folder for Capacitor
        run: |
          mkdir -p www
          cp -r build/client/* www/

          # Find the entry.client JS file (hashed name)
          ENTRY_JS=$(ls www/assets/entry.client-*.js 2>/dev/null | head -1 | sed 's|www/||')
          if [ -z "$ENTRY_JS" ]; then
            echo "ERROR: entry.client JS file not found!"
            echo "Available files in www/assets:"
            ls www/assets/ 2>/dev/null || echo "(empty)"
            exit 1
          fi
          echo "Found entry point: $ENTRY_JS"

          # Collect all CSS files to link
          CSS_LINKS=""
          for css in www/assets/*.css; do
            if [ -f "$css" ]; then
              rel=$(echo "$css" | sed 's|www/||')
              CSS_LINKS="${CSS_LINKS}    <link rel=\"stylesheet\" href=\"$rel\">"$'\n'
            fi
          done

          # Generate proper index.html that loads the hashed entry point and CSS
          cat > www/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en" data-theme="dark">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
            <title>Bolt.diy</title>
            <meta name="description" content="Bolt.diy - AI Assistant">
            <link rel="icon" type="image/svg+xml" href="favicon.svg">
          ${CSS_LINKS}
            <script>
              (function() {
                var theme = localStorage.getItem('bolt_theme');
                if (!theme) {
                  theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.querySelector('html').setAttribute('data-theme', theme);
              })();
            </script>
          </head>
          <body>
            <div id="root" class="w-full h-full"></div>
            <script type="module" src="$ENTRY_JS"></script>
          </body>
          </html>
          HTMLEOF

          echo "=== Generated index.html ==="
          cat www/index.html
          echo "============================"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor and Android platform
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Build APK with Capacitor
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android
          npx cap sync

          # Forçar versão do Kotlin para resolver conflitos
          echo "subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }" >> android/build.gradle

          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-app
          path: android/app/build/outputs/apk/debug/*.apk