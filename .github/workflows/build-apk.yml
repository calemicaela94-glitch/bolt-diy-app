name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Inspect build output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== build/client contents ==="
          ls -la build/client/ 2>/dev/null || echo "build/client not found"
          echo "=== build contents ==="
          ls -la build/ 2>/dev/null || echo "build not found"
          echo "=== public contents ==="
          ls -la public/ 2>/dev/null || echo "public not found"
          echo "=== app contents ==="
          ls -la app/ 2>/dev/null | head -10 || echo "app not found"

      - name: Prepare www folder
        run: |
          # Criar a pasta www primeiro
          mkdir -p www
          
          # Tentar diferentes origens para os ficheiros
          if [ -d "build/client" ] && [ "$(ls -A build/client)" ]; then
            echo "Copying from build/client"
            cp -r build/client/* www/
          elif [ -d "build" ] && [ "$(ls -A build)" ]; then
            echo "Copying from build"
            cp -r build/* www/
          elif [ -d "public" ] && [ "$(ls -A public)" ]; then
            echo "Copying from public"
            cp -r public/* www/
          else
            echo "No build output found, creating minimal index.html"
            cat > www/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Bolt.diy</title>
            </head>
            <body>
              <div id="root">Aplicação carregando...</div>
            </body>
            </html>
            EOF
          fi
          
          echo "=== www contents ==="
          ls -la www/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor and add Android
        run: |
          npx cap init Bolt.diy ai.bolt.app --web-dir=www
          npx cap add android

      - name: Fix Kotlin version conflicts
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bolt-diy-app
          path: android/app/build/outputs/apk/debug/*.apk
