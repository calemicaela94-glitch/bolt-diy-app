name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - name: Install dependencies
        run: npm install
      - name: Setup EAS CLI
        run: npm install -g eas-cli
      - name: Authenticate with Expo
        run: echo "//expo.dev/@${{ secrets.EXPO_USERNAME }}|${{ secrets.EXPO_PASSWORD }}" > ~/.npmrc
      - name: Run EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: cd BoltDIYApp && eas build --platform android